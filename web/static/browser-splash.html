<!DOCTYPE html>
<html>
<head><title>AI Gator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;display:flex;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.splash{text-align:center;color:#e2e8f0}
.icon{font-size:4rem;margin-bottom:1rem}
.title{font-size:1.4rem;font-weight:700;color:#4ade80;margin-bottom:0.5rem}
.sub{font-size:0.85rem;color:#64748b}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#4ade80;margin:0 2px;animation:pulse 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>
<div class="splash">
<div class="icon">&#x1F40A;</div>
<div class="title">AI Gator</div>
<div class="sub">Preparing browser <span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
</div>
</body>
</html>
