<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark app-toned background -->
  <rect width="32" height="32" rx="7" fill="#0c1a0f"/>
  <!-- Gator head (top-down view) -->
  <ellipse cx="16" cy="19" rx="11" ry="8.5" fill="#166534"/>
  <!-- Snout pointing upward -->
  <path d="M10 13 Q16 5 22 13 L21 16 Q16 13.5 11 16 Z" fill="#22c55e"/>
  <!-- Nostrils -->
  <circle cx="13.5" cy="9.5" r="1.3" fill="#14532d"/>
  <circle cx="18.5" cy="9.5" r="1.3" fill="#14532d"/>
  <!-- Left eye -->
  <circle cx="7" cy="15" r="3.5" fill="#eab308"/>
  <ellipse cx="7" cy="15" rx="1.2" ry="2.2" fill="#0c0c0c"/>
  <circle cx="6.4" cy="13.8" r="0.8" fill="rgba(255,255,255,0.35)"/>
  <!-- Right eye -->
  <circle cx="25" cy="15" r="3.5" fill="#eab308"/>
  <ellipse cx="25" cy="15" rx="1.2" ry="2.2" fill="#0c0c0c"/>
  <circle cx="24.4" cy="13.8" r="0.8" fill="rgba(255,255,255,0.35)"/>
  <!-- Mouth line -->
  <path d="M7 22 Q16 28.5 25 22" stroke="#14532d" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Teeth -->
  <rect x="12" y="21" width="2" height="3" rx="0.8" fill="white" opacity="0.9"/>
  <rect x="15.5" y="21.5" width="1.5" height="2.5" rx="0.7" fill="white" opacity="0.9"/>
  <rect x="18.5" y="21" width="2" height="3" rx="0.8" fill="white" opacity="0.9"/>
</svg>
